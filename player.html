<!DOCTYPE html>
<html>
<head>
    <title>poisondaggers // player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player {
            width: 400px;
            background: #1a1a2e;
            border: 1px solid #bd93f9;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(189,147,249,0.2);
        }

        .player-title {
            color: #bd93f9;
            font-size: 0.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-align: center;
        }

        .now-playing {
            text-align: center;
            margin-bottom: 25px;
        }

        .song-title {
            color: #e0e0e0;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .song-artist {
            color: #6272a4;
            font-size: 0.85em;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #0d0d0d;
            border-radius: 2px;
            margin: 20px 0;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #bd93f9;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
            box-shadow: 0 0 8px #bd93f9;
        }

        .time {
            display: flex;
            justify-content: space-between;
            color: #6272a4;
            font-size: 0.75em;
            margin-top: -15px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .btn {
            background: transparent;
            border: none;
            color: #6272a4;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px;
        }

        .btn:hover { color: #bd93f9; text-shadow: 0 0 10px #bd93f9; }

        .btn-play {
            background: #bd93f9;
            color: #0d0d0d;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Share Tech Mono', monospace;
        }

        .btn-play:hover {
            background: #ff79c6;
            box-shadow: 0 0 20px rgba(255,121,198,0.5);
            transform: scale(1.05);
        }

        .playlist {
            border-top: 1px solid #6272a430;
            padding-top: 15px;
        }

        .playlist-title {
            color: #6272a4;
            font-size: 0.75em;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .playlist-item {
            padding: 8px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
        }

        .playlist-item:hover {
            background: #0d0d0d;
            color: #bd93f9;
        }

        .playlist-item.active {
            background: #0d0d0d;
            color: #50fa7b;
            border-left: 2px solid #50fa7b;
            padding-left: 8px;
        }

        .playlist-item .duration {
            color: #6272a4;
            font-size: 0.8em;
        }

        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 40px;
            margin-bottom: 20px;
        }

        .bar {
            width: 4px;
            background: #bd93f9;
            border-radius: 2px;
            transition: height 0.1s;
            box-shadow: 0 0 4px #bd93f9;
        }
    </style>
</head>
<body>
    <div class="player">
        <div class="player-title">> poisondaggers // player</div>
        
        <div class="visualizer" id="visualizer"></div>

        <div class="now-playing">
            <div class="song-title" id="song-title">select a song</div>
            <div class="song-artist" id="song-artist">--</div>
        </div>

        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time">
            <span id="current-time">0:00</span>
            <span id="total-time">0:00</span>
        </div>

        <div class="controls">
            <button class="btn" onclick="prevSong()">&#9664;&#9664;</button>
            <button class="btn-play" id="play-btn" onclick="togglePlay()">&#9654;</button>
            <button class="btn" onclick="nextSong()">&#9654;&#9654;</button>
        </div>

        <div class="playlist">
            <div class="playlist-title">playlist</div>
            <div id="playlist"></div>
        </div>
    </div>

    <script>
        const songs = [
            { title: "Flesh", artist: "Simon Curtis", duration: "3:22" },
            { title: "Super Psycho Love", artist: "Simon Curtis", duration: "3:45" },
            { title: "I Want Your Bite", artist: "Cara Cunningham", duration: "3:15" },
            { title: "Strangers", artist: "Ethel Cain", duration: "4:12" },
            { title: "I Bet on Losing Dogs", artist: "Mitski", duration: "2:58" },
            { title: "A House in Nebraska", artist: "Ethel Cain", duration: "5:30" },
            { title: "Drag Path", artist: "Ethel Cain", duration: "4:45" },
        ];

        let currentSong = 0;
        let isPlaying = false;
        let progress = 0;
        let progressTimer;

        // build visualizer bars
        const viz = document.getElementById('visualizer');
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '4px';
            viz.appendChild(bar);
        }

        // build playlist
        const playlistEl = document.getElementById('playlist');
        songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.id = `track-${index}`;
            item.innerHTML = `<span>${song.title} — ${song.artist}</span><span class="duration">${song.duration}</span>`;
            item.onclick = () => loadSong(index);
            playlistEl.appendChild(item);
        });

        function loadSong(index) {
            currentSong = index;
            const song = songs[index];
            document.getElementById('song-title').textContent = song.title;
            document.getElementById('song-artist').textContent = song.artist;
            document.getElementById('total-time').textContent = song.duration;
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('current-time').textContent = '0:00';
            progress = 0;

            document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`track-${index}`).classList.add('active');

            if (isPlaying) {
                clearInterval(progressTimer);
                startProgress();
            }
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');
            btn.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
            
            if (isPlaying) {
                if (document.getElementById('song-title').textContent === 'select a song') {
                    loadSong(0);
                }
                startProgress();
                animateViz();
            } else {
                clearInterval(progressTimer);
                stopViz();
            }
        }

        function startProgress() {
            const duration = parseDuration(songs[currentSong].duration);
            progressTimer = setInterval(() => {
                progress += 1;
                if (progress >= duration) {
                    nextSong();
                    return;
                }
                const pct = (progress / duration) * 100;
                document.getElementById('progress-fill').style.width = pct + '%';
                document.getElementById('current-time').textContent = formatTime(progress);
            }, 1000);
        }

        function parseDuration(str) {
            const [m, s] = str.split(':').map(Number);
            return m * 60 + s;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function nextSong() {
            clearInterval(progressTimer);
            progress = 0;
            loadSong((currentSong + 1) % songs.length);
            if (isPlaying) startProgress();
        }

        function prevSong() {
            clearInterval(progressTimer);
            progress = 0;
            loadSong((currentSong - 1 + songs.length) % songs.length);
            if (isPlaying) startProgress();
        }

        let vizTimer;
        function animateViz() {
            const bars = document.querySelectorAll('.bar');
            vizTimer = setInterval(() => {
                bars.forEach(bar => {
                    const h = Math.random() * 35 + 4;
                    bar.style.height = h + 'px';
                });
            }, 100);
        }

        function stopViz() {
            clearInterval(vizTimer);
            document.querySelectorAll('.bar').forEach(bar => bar.style.height = '4px');
        }

        // click progress bar to seek
        document.getElementById('progress-bar').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            const duration = parseDuration(songs[currentSong].duration);
            progress = Math.floor(pct * duration);
            document.getElementById('progress-fill').style.width = (pct * 100) + '%';
            document.getElementById('current-time').textContent = formatTime(progress);
        });
    </script>
</body>
</html>
